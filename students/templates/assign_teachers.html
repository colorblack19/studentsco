<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

/* WRAPPER */
.assign-wrapper{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

/* CARD */
.assign-card{
    background:rgba(255,255,255,0.96);
    backdrop-filter:blur(10px);
    border-radius:22px;
    padding:35px;
    margin-bottom:30px;
    box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.8);
    border:1px solid rgba(255,255,255,0.5);
    transition:.35s ease;
}

/* CARD HOVER */
.assign-card:hover{
    transform:translateY(-4px);
    box-shadow:
        0 20px 40px rgba(0,0,0,0.10);
}

/* HEADINGS */
.assign-card h2{
    font-size:28px;
    margin-bottom:25px;
    color:#0f172a;
    font-weight:800;
    border-left:5px solid #16a34a;
    padding-left:15px;
}

/* LABELS */
.assign-card label{
    display:block;
    margin-bottom:8px;
    margin-top:15px;
    font-weight:600;
    color:#334155;
}

/* INPUTS */
.assign-card select,
.assign-card input,
.assign-card textarea{
    width:100%;
    padding:14px 18px;
    border:1px solid #dbe3ec;
    border-radius:14px;
    font-size:15px;
    outline:none;
    transition:.3s;
    background:#f8fafc;
}

/* INPUT FOCUS */
.assign-card select:focus,
.assign-card input:focus,
.assign-card textarea:focus{
    border-color:#16a34a;
    box-shadow:0 0 0 4px rgba(34,197,94,0.15);
    background:white;
}

/* BUTTON */
.assign-card button{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.3s ease;
    box-shadow:0 6px 18px rgba(34,197,94,0.25);
}

/* BUTTON HOVER */
.assign-card button:hover{
    transform:translateY(-2px);
    background:linear-gradient(135deg,#16a34a,#15803d);
    box-shadow:0 10px 25px rgba(34,197,94,0.35);
}

/* ERROR TEXT */
.errorlist{
    list-style:none;
    color:#dc2626;
    margin-bottom:10px;
    font-size:14px;
    font-weight:600;
}

/* MOBILE */
@media(max-width:768px){

    .assign-card{
        padding:25px;
    }

    .assign-card h2{
        font-size:22px;
    }

}
/* GRID SYSTEM */
.assign-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
    gap:30px;
    align-items:start;
}

/* FORCE SAME SIZE */
.assign-card{
    width:100%;
    min-height:420px;
}
</style>

<div class="assign-wrapper">

    <div class="assign-grid">

        <div class="assign-card">
            <h2>👨‍🏫 Assign Class Teacher</h2>

            <form method="POST">
                {% csrf_token %}
                {{ class_form.as_p }}

                <button type="submit" name="save_class_teacher">
                    Save Class Teacher
                </button>
            </form>
        </div>


        <div class="assign-card">
            <h2>📚 Assign Subject Teacher</h2>

            <form method="POST">
                {% csrf_token %}
                {{ subject_form.as_p }}

                <button type="submit" name="save_subject_teacher">
                    Save Subject Teacher
                </button>
            </form>
        </div>


        <div class="assign-card">
            <h2>🏫 Principal Settings</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ school_form.as_p }}

                <button type="submit" name="save_school_settings">
                    Save Principal Details
                </button>
            </form>
        </div>

    </div>

</div>
